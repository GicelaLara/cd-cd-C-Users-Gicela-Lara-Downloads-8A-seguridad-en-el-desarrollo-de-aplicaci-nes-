<div class="container">

    <div class="left">
        <img src="constructor.png">
        <h2>ToolCenter</h2>
    </div>

    <div class="right">

        <div class="login-box">

            <input type="text" placeholder="Email" [(ngModel)]="email">

            <input type="password" placeholder="Contraseña" [(ngModel)]="password">

            <button (click)="login()">Inicia Sesión</button>

            <a href="#">¿Has olvidado tu contraseña?</a>

        </div>

    </div>

</div>
